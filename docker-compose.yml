services:
  # ============================================================================
  # SHARED INFRASTRUCTURE
  # ============================================================================
  db:
    image: postgres:15-alpine
    container_name: maestro-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5433:5432"
    volumes:
      - ./scripts/init-maestro-db.sh:/docker-entrypoint-initdb.d/init-db.sh
      - ./bombcrypto-market-v2:/submodules/market
      - ./bombcrypto-server-v2:/submodules/server
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: maestro-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================================================
  # WEB3 & BLOCKCHAIN LAYER
  # ============================================================================
  rpc-proxy:
    image: node:18-alpine
    container_name: maestro-rpc-proxy
    working_dir: /app
    volumes:
      - ./bombcrypto-api-v2/rpc-api:/app
      - ./maestro.env:/app/.env
    command: ["npm", "start"]
    ports:
      - "8005:8105"
    depends_on:
      redis:
        condition: service_healthy

  blockchain-api:
    image: node:18-alpine
    container_name: maestro-blockchain-api
    working_dir: /app
    volumes:
      - ./bombcrypto-api-v2/blockchain-center-api:/app
      - ./maestro.env:/app/.env
    command: ["node", "server.js"]
    ports:
      - "3005:3001"
    depends_on:
      - rpc-proxy

  # ============================================================================
  # MARKETPLACE LAYER
  # ============================================================================
  market-api:
    image: node:18-alpine
    container_name: maestro-market-api
    working_dir: /app
    volumes:
      - ./bombcrypto-market-v2/backend:/app
      - ./maestro.env:/app/.env
    command: ["npm", "run", "start:dev"]
    ports:
      - "3007:3003"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      blockchain-api:
        condition: service_started

  # ============================================================================
  # GAME SERVER LAYER
  # ============================================================================
  login-api:
    image: node:18-alpine
    container_name: maestro-login-api
    working_dir: /app
    volumes:
      - ./bombcrypto-server-v2/api/login:/app
      - ./maestro.env:/app/.env
    command: ["npm", "run", "dev"]
    ports:
      - "8006:8120"
    depends_on:
      db:
        condition: service_healthy

  # ============================================================================
  # GAME SERVICES (TREASURE HUNT & PVP)
  # ============================================================================
  th-server:
    image: node:18-alpine
    container_name: maestro-th-server
    working_dir: /app
    volumes:
      - ./bombcrypto-api-v2/th-mode-server:/app
      - ./maestro.env:/app/.env
    environment:
      - PORT=8106
    command: ["npm", "run", "dev"]
    ports:
      - "3006:8106"
    depends_on:
      redis:
        condition: service_healthy

  pvp-api:
    image: node:18-alpine
    container_name: maestro-pvp-api
    working_dir: /app
    volumes:
      - ./bombcrypto-server-v2/api/pvp-matching:/app
      - ./maestro.env:/app/.env
    environment:
      - PORT=8007
    command: ["npm", "run", "dev"]
    ports:
      - "8007:8007"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ============================================================================
  # UI LAYER (FRONTENDS)
  # ============================================================================
  market-ui:
    image: node:18-alpine
    container_name: maestro-market-ui
    working_dir: /app
    volumes:
      - ./bombcrypto-market-v2/frontend:/app
      - ./maestro.env:/app/.env
    environment:
      - VITE_PORT=4005
      - VITE_RPC_HOST=http://localhost:8005
    command: ["npm", "run", "dev", "--", "--port", "4005", "--host"]
    ports:
      - "4005:4005"
    depends_on:
      - market-api

  th-ui:
    image: node:18-alpine
    container_name: maestro-th-ui
    working_dir: /app
    volumes:
      - ./bombcrypto-api-v2/th-mode-client:/app
      - ./maestro.env:/app/.env
    environment:
      - VITE_PORT=4006
      - VITE_API_URL=http://localhost:3006
    command: ["npm", "run", "dev", "--", "--port", "4006", "--host"]
    ports:
      - "4006:4006"
    depends_on:
      - th-server

  game-server:
    build:
      context: .
      dockerfile: Dockerfile.maestro-sfs
    container_name: maestro-game-server
    working_dir: /opt/SmartFoxServer_2X/SFS2X
    volumes:
      - ./bombcrypto-server-v2/server/deploy/SmartFoxServer_2X/SFS2X/extensions:/opt/SmartFoxServer_2X/SFS2X/extensions
      - ./bombcrypto-server-v2/server/deploy/SmartFoxServer_2X/SFS2X/zones:/opt/SmartFoxServer_2X/SFS2X/zones
      - ./bombcrypto-server-v2/server/deploy/SmartFoxServer_2X/SFS2X/config:/opt/SmartFoxServer_2X/SFS2X/config
      - ./maestro.env:/opt/SmartFoxServer_2X/SFS2X/.env
    ports:
      - "9933:9933"
      - "8081:8080"
    depends_on:
      - login-api
      - pvp-api
      db:
        condition: service_healthy

networks:
  default:
    name: maestro-network
