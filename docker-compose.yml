# 🌹 Orchestrated with passion by AVRE
version: '3.8'

services:
  postgres:
    image: postgres:17
    container_name: bombcrypto-postgres
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
      - ./scripts/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
      - ./bombcrypto-server-v2/server/db:/docker-entrypoint-initdb.d/server-db

  redis:
    image: redis:8
    container_name: bombcrypto-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"

  hardhat-node:
    profiles: ["contract"]
    image: node:22-bullseye
    container_name: bombcrypto-hardhat
    working_dir: /app
    env_file: .env
    volumes:
      - ./bombcrypto-contract-v2/base-hardhat:/app
      - hardhat-node_modules:/app/node_modules
      - ./scripts/mock-hardhat-env.json:/app/env.json
    command: sh -c "npm install --ignore-scripts && npx hardhat node"
    ports:
      - "${HARDHAT_PORT:-8545}:8545"

  ap-login:
    profiles: ["server"]
    image: node:22-bullseye
    container_name: bombcrypto-ap-login
    working_dir: /app
    env_file: .env
    volumes:
      - ./bombcrypto-server-v2/api/login:/app
      - ap-login_node_modules:/app/node_modules
    command: sh -c "npm install && npm start"
    environment:
      OBFUSCATE_BYTES_APPEND: "0"
      DB_HOST: postgres
      POSTGRES_CONNECTION_STRING_BACKEND: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/backend
      POSTGRES_CONNECTION_STRING_BOMBCRYPTO: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/bombcrypto2
      REDIS_CONNECTION_STRING: redis://redis:6379
      REDIS_HOST: redis
      DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-postgres}"
      JWT_LOGIN_SECRET: ${JWT_LOGIN_SECRET}
      JWT_BEARER_SECRET: ${JWT_BEARER_SECRET}
      AP_LOGIN_TOKEN: ${AP_LOGIN_TOKEN}
      AES_SECRET: ${AES_SECRET}
    ports:
      - "${AP_LOGIN_PORT:-8120}:8120"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  ap-market:
    profiles: ["market"]
    image: node:22-bullseye
    container_name: bombcrypto-ap-market
    working_dir: /app
    env_file: .env
    volumes:
      - ./bombcrypto-server-v2/api/market:/app
      - ap-market_node_modules:/app/node_modules
    command: sh -c "npm install && npm start"
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-postgres}"
      JWT_BEARER_SECRET: ${JWT_BEARER_SECRET}
    ports:
      - "${AP_MARKET_PORT:-9120}:9120"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  sfs-game-1:
    profiles: ["server"]
    build:
      context: ./bombcrypto-server-v2/server/deploy
      dockerfile: Dockerfile.arm64
    container_name: bombcrypto-sfs-game-1
    env_file: .env
    command: /bin/bash -c "find . -type f -name '*.sh' -exec sed -i 's/\r$$//g' {} + && bash run.sh"
    ports:
      - "${SFS_HTTP_PORT:-8080}:8080"
      - "${SFS_HTTPS_PORT:-8443}:8443"
      - "${SFS_TCP_PORT:-9933}:9933/tcp"
      - "${SFS_UDP_PORT:-9933}:9933/udp"
      - "${SFS_ADMIN_PORT:-9898}:9898"
    environment:
      IS_DEBUG: "1"
      IS_PVP_SERVER: "0"
      IS_GAME_SERVER: "1"
      MAX_CCU: "100"
      HTTP_PORT: "8080"
      HTTPS_PORT: "8443"
      MAX_CONNECTIONS_PER_IP: "50"
      SERVER_NAME: 'sfs-game-1'
      LICENSE_CODE: ''
      CREDENTIALS: 'bombcryptodev,123456'
      JWT_LOGIN_SECRET: ${JWT_LOGIN_SECRET}
      JWT_BEARER_SECRET: ${JWT_BEARER_SECRET}
      AP_LOGIN_TOKEN: ${AP_LOGIN_TOKEN}
      AES_SECRET: ${AES_SECRET}
    depends_on:
      - postgres
      - redis
    volumes:
      - ./bombcrypto-server-v2/server/deploy/SmartFoxServer_2X:/opt/SmartFoxServer_2X_Patch:ro
      - ./client_logs:/opt/SmartFoxServer_2X/SFS2X/clientLogs:rw
      - ./extensions_volume:/opt/SmartFoxServer_2X/SFS2X/extensions:rw

  market-frontend:
    profiles: ["market"]
    image: node:22-bullseye
    container_name: bombcrypto-market-frontend
    working_dir: /app
    env_file: .env
    volumes:
      - ./bombcrypto-market-v2/frontend:/app
      - market-frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_HOST: "http://localhost:${AP_LOGIN_PORT:-8120}/web"
      VITE_MARKET_API_HOST: "http://localhost:${MARKET_API_PORT:-3000}"
    ports:
      - "${MARKET_FRONTEND_PORT:-5173}:5173"

  market-api:
    profiles: ["market"]
    image: node:22-bullseye
    container_name: bombcrypto-market-api
    working_dir: /app
    env_file: .env
    volumes:
      - ./bombcrypto-market-v2/backend:/app
      - market-api_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev:api:bsc"
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-postgres}"
      POSTGRES_CONN_STR: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/bombcrypto"
    ports:
      - "${MARKET_API_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  detect-transfer:
    profiles: ["market"]
    image: node:22-bullseye
    container_name: bombcrypto-detect-transfer
    working_dir: /app
    env_file: .env
    volumes:
      - ./bombcrypto-market-v2/detect-transfer:/app
      - detect-transfer_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev"
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-postgres}"
      POSTGRES_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/bombcrypto"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  blockchain-center-api:
    profiles: ["market"]
    image: node:22-bullseye
    container_name: bombcrypto-blockchain-center
    working_dir: /app
    env_file: .env
    volumes:
      - ./bombcrypto-market-v2/blockchain-center-api:/app
      - blockchain-center_node_modules:/app/node_modules
    command: sh -c "npm install && npx nodemon server.js"
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-postgres}"
    ports:
      - "${BLOCKCHAIN_CENTER_PORT:-3003}:3003"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  hardhat-node_modules:
  ap-login_node_modules:
  ap-market_node_modules:
  market-frontend_node_modules:
  market-api_node_modules:
  detect-transfer_node_modules:
  blockchain-center_node_modules:
